<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compound Interest Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    h2 {
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Compound Interest</h2>

  <label>Principal (€)</label>
  <input type="number" id="principal" placeholder="e.g. 1000">

  <label>Interest Rate (%)</label>
  <input type="number" id="rate" placeholder="e.g. 5">

  <label>Time (years)</label>
  <input type="number" id="time" placeholder="e.g. 10">

  <label>Compounds per year</label>
  <input type="number" id="n" placeholder="e.g. 4">

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script>
function calculate() {
  let P = parseFloat(document.getElementById('principal').value);
  let r = parseFloat(document.getElementById('rate').value) / 100;
  let t = parseFloat(document.getElementById('time').value);
  let n = parseFloat(document.getElementById('n').value);

  if (isNaN(P) || isNaN(r) || isNaN(t) || isNaN(n)) {
    document.getElementById('result').innerText = "Please fill all fields.";
    return;
  }

  let A = P * Math.pow((1 + r / n), n * t);

  document.getElementById('result').innerText =
    "Final Amount: €" + A.toFixed(2);
}
</script>

</body>
</html>
